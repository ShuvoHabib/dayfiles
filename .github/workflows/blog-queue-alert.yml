name: Blog Queue Alerts

on:
  workflow_run:
    workflows:
      - Blog Queue Publish
    types:
      - completed

permissions:
  issues: write

jobs:
  notify-on-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const title = 'Blog queue publish failure';
            const issueBody = [
              `@${context.repo.owner} the scheduled blog queue publish workflow failed.`,
              '',
              `- Workflow: ${run.name}`,
              `- Conclusion: ${run.conclusion}`,
              `- Event: ${run.event}`,
              `- Branch: ${run.head_branch}`,
              `- Run: ${run.html_url}`,
              `- Updated: ${run.updated_at}`,
              '',
              'Check the workflow logs, fix the failure, and rerun the job if needed.'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: issueBody
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: issueBody
            });

  resolve-after-success:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Close active failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const title = 'Blog queue publish failure';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);

            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: [
                `The blog queue publish workflow recovered successfully.`,
                '',
                `- Workflow: ${run.name}`,
                `- Event: ${run.event}`,
                `- Run: ${run.html_url}`,
                `- Updated: ${run.updated_at}`
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed'
            });
